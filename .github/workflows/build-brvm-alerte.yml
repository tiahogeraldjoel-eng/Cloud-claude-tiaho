name: Build BRVM Alerte APK

on:
  push:
    branches:
      - feat/brvm-alerte-compilation
      - main
    paths:
      - 'BRVMAlerte/**'
      - '.github/workflows/build-brvm-alerte.yml'
  pull_request:
    paths:
      - 'BRVMAlerte/**'
      - '.github/workflows/build-brvm-alerte.yml'
  workflow_dispatch:

jobs:
  build:
    name: Compile APK Debug
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses \
            > /dev/null 2>&1 || true

      - name: Bootstrap gradle-wrapper.jar
        working-directory: BRVMAlerte
        run: |
          mkdir -p gradle/wrapper
          curl -sSLo /tmp/gradle.zip \
            https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -j /tmp/gradle.zip "*/gradle-wrapper.jar" -d gradle/wrapper/
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: BRVMAlerte
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8"
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BRVM-Alerte-debug-apk
          path: BRVMAlerte/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Summary
        if: success()
        run: |
          APK="BRVMAlerte/app/build/outputs/apk/debug/app-debug.apk"
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "## BRVM Alerte APK compilé avec succès" >> $GITHUB_STEP_SUMMARY
          echo "| Propriété | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Taille | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Application ID | \`com.brvm.alerte\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | 1.0.0 (compileSdk 34) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "APK disponible dans les **Artifacts** (30 jours)." >> $GITHUB_STEP_SUMMARY
