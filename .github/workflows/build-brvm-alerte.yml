name: Build BRVM Alerte APK

on:
  push:
    branches:
      - feat/brvm-alerte-compilation
      - main
    paths:
      - 'BRVMAlerte/**'
      - '.github/workflows/build-brvm-alerte.yml'
  pull_request:
    paths:
      - 'BRVMAlerte/**'
      - '.github/workflows/build-brvm-alerte.yml'
  workflow_dispatch:

jobs:
  build:
    name: Compile APK Debug
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Accept Android SDK licenses
        run: |
          mkdir -p "$ANDROID_HOME/licenses"
          printf '%s\n' \
            '8933bad161af4178b1185d1a37fbf41ea5269c55' \
            'd56f5187479451eabf01fb78af6dfcb131a6481e' \
            '24333f8a63b6825ea9c5514f83c2829b004d1fee' \
            > "$ANDROID_HOME/licenses/android-sdk-license"
          printf '%s\n' \
            '84831b9409646a918e30573bab4c9c91346d8abd' \
            > "$ANDROID_HOME/licenses/android-sdk-preview-license"

      - name: Bootstrap gradle-wrapper.jar
        working-directory: BRVMAlerte
        run: |
          mkdir -p gradle/wrapper
          curl -sSLo /tmp/gradle.zip \
            https://services.gradle.org/distributions/gradle-8.7-bin.zip
          # Extraire le jar avec son chemin exact dans le zip (grade-8.7/lib/)
          unzip -p /tmp/gradle.zip \
            "gradle-8.7/lib/gradle-wrapper-8.7.jar" \
            > gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Build Debug APK
        working-directory: BRVMAlerte
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BRVM-Alerte-debug-apk
          path: BRVMAlerte/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Summary
        if: success()
        run: |
          APK="BRVMAlerte/app/build/outputs/apk/debug/app-debug.apk"
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "## BRVM Alerte APK compilé avec succès" >> $GITHUB_STEP_SUMMARY
          echo "| Propriété | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Taille | $SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Application ID | \`com.brvm.alerte\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | 1.0.0 |" >> $GITHUB_STEP_SUMMARY
          echo "APK disponible dans les **Artifacts** (30 jours)." >> $GITHUB_STEP_SUMMARY
