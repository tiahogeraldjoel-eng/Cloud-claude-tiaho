name: Build BRVM Alerte APK

on:
  push:
    branches:
      - claude/brvm-alert-compilation-YtS27
      - main
    paths:
      - 'BRVMAlerte/**'
  pull_request:
    paths:
      - 'BRVMAlerte/**'
  workflow_dispatch:

jobs:
  build:
    name: Compile APK Debug
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('BRVMAlerte/**/*.gradle*', 'BRVMAlerte/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Grant execute permission for gradlew
        working-directory: BRVMAlerte
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: BRVMAlerte
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BRVM-Alerte-debug-apk
          path: BRVMAlerte/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Summary
        if: success()
        run: |
          APK_PATH="BRVMAlerte/app/build/outputs/apk/debug/app-debug.apk"
          APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "## ✅ BRVM Alerte APK compilé avec succès" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Propriété | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Fichier | \`app-debug.apk\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Taille | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Application ID | \`com.brvm.alerte\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | 1.0.0 (build 1) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "L'APK est disponible dans les **Artifacts** de cette exécution (30 jours)." >> $GITHUB_STEP_SUMMARY
